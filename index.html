<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Meme Feed</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      scrollbar-color: #24a153 #111;
    }

    html {
      background: #000;
      scrollbar-color: #24a153 #111;
    }

    * {
      scrollbar-width: thin;
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: #111;
    }

    *::-webkit-scrollbar-thumb {
      background: #24a153;
      border-radius: 999px;
    }

    .feed {
      max-width: 700px;
      margin: auto;
      padding: 0px 10px 96px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-left: 16px;
      margin-right: 16px;
    }

    .feed-topbar {
      max-width: 700px;
      margin: 0 auto;
      padding: 10px;
      padding-top: 40px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      box-sizing: border-box;
      margin-left: 16px;
      margin-right: 16px;
    }

    .feed-stat {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background: #1b1b1d;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .feed-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.6);
    }

    .feed-stat-value {
      font-size: 16px;
      /* font-weight: 700; */
      /* color: #1eab55; */
      line-height: 1;
    }

    .meme {
      margin-bottom: 0;
    }

    .meme img,
    .meme video {
      width: 100%;
      height: auto;
      display: block;
      background: #050505;
    }

    video {
      object-fit: contain;
    }

    .image-shell {
      position: relative;
      margin-bottom: 22px;
      background: #050505;
      overflow: hidden;
      min-height: 400px;
      width: 100%;
    }

    .image-shell::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      margin: -16px 0 0 -16px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: image-spinner 0.75s linear infinite;
    }

    .image-shell.is-loaded::before,
    .image-shell.is-error::before {
      display: none;
    }

    .image-shell img {
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .image-shell.is-loaded img,
    .image-shell.is-error img {
      opacity: 1;
    }

    @keyframes image-spinner {
      to {
        transform: rotate(360deg);
      }
    }

    .search-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(0px, env(safe-area-inset-bottom));
      z-index: 1000;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    body[data-view="grid"] .feed {
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    body[data-view="grid"] .feed-topbar {
      max-width: 1200px;
    }

    body[data-view="grid"] .image-shell {
      min-height: 220px;
    }

    floating-octocat {
      position: fixed;
      right: 16px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      width: 64px;
      height: 64px;
      display: block;
      z-index: 1001;
      pointer-events: none;
      border: 2px solid rgba(36, 161, 83, 0.9);
      border-radius: 42% / 46%;
      box-shadow: 0 0 12px rgba(36, 161, 83, 0.35);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    floating-octocat img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    floating-octocat.is-interactive {
      pointer-events: auto;
    }

    floating-octocat.is-hovered {
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(36, 161, 83, 0.55);
    }

    #upload-memes {
      position: fixed;
      left: 16px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      z-index: 1001;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: #172920;
      color: #fff;
      border: 1px solid #24a153;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    @media (max-width: 767px) {
      .feed {
        
      }

      .feed-topbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding-top: 72px;
      }

      .feed-stat {
        padding: 12px 14px;
      }

      .feed-stat-value {
        font-size: 20px;
      }

      floating-octocat {
        right: 12px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        width: 48px;
        height: 48px;
      }
    }
    side-menu {
      --side-menu-width: 250px;
    }

    side-menu [data-side-menu-item] {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.2;
      border-radius: 10px;
    }

    .side-menu-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      object-fit: contain;
    }

    .side-menu-label {
      min-width: 0;
    }

    body {
      padding-left: var(--side-menu-width, 250px);
      box-sizing: border-box;
    }

    .feed {
      /* margin-left: max(24px, calc((100vw - 250px - 700px) / 2)); */
      margin-right: 16px;
    }

    .search-shell {
      left: var(--side-menu-width, 250px);
    }

    @media (max-width: 767px) {
      body {
        padding-left: 0;
      }

      .feed {
        margin: auto;
      }

      .search-shell {
        left: 0;
      }

      body.menu-open {
        overflow: hidden;
      }
    }

    @media (min-width: 768px) {
      .search-shell {
      }

      .feed {
        padding-bottom: 110px;
      }

      #floating-octocat {
        right: 20px;
        bottom: calc(104px + env(safe-area-inset-bottom));
      }

    }
  </style>
</head>

<body>
  <style>
    side-menu {
      color: #fff;

    <a href="#new" data-side-menu-item data-nav-endpoint="/api/meme/latest"><img class="side-menu-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2728.svg" alt="" aria-hidden="true"><span class="side-menu-label">New</span></a>
    <a href="#rising" data-side-menu-item data-nav-endpoint="/api/meme/rising"><img class="side-menu-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4c8.svg" alt="" aria-hidden="true"><span class="side-menu-label">Rising</span></a>
    <a href="#contests" data-side-menu-item data-nav-endpoint="/api/meme/contests"><img class="side-menu-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3c6.svg" alt="" aria-hidden="true"><span class="side-menu-label">Contests</span></a>
    <a href="#trending-tags" data-side-menu-item data-nav-endpoint="/api/meme/trending-tags"><img class="side-menu-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f3f7.svg" alt="" aria-hidden="true"><span class="side-menu-label">Trending Tags</span></a>
    <a href="#top-creators" data-side-menu-item data-nav-endpoint="/api/meme/creators/top"><img class="side-menu-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f451.svg" alt="" aria-hidden="true"><span class="side-menu-label">Top Creators</span></a>
  </side-menu>
  <h1 class="me"> </h1>

  <page-topbar aria-label="Feed controls"></page-topbar>
  <feed-topbar></feed-topbar>
  <feed-navbar></feed-navbar>

  <div class="feed" id="feed">
  </div>

  <script type="module" src="./lib/web-components/PageTopbar.js"></script>
  <script type="module" src="./web-components/FeedNavbar.js"></script>
  <script type="module" src="/meme-client.js"></script>
  <script type="module" src="./lib/web-components/FeedTopbar.js"></script>
  <script type="module" src="./lib/web-components/SideMenu.js"></script>
  <script>
    customElements.whenDefined("side-menu").then(() => {
      const sideMenu = document.getElementById("side-menu");
      const shadowRoot = sideMenu?.shadowRoot;
      if (!shadowRoot || shadowRoot.querySelector("[data-theme-override]")) {
        return;
      }

      const style = document.createElement("style");
      style.setAttribute("data-theme-override", "true");
      style.textContent = `
        :host {
          color: #fff;
        }

        .side-menu-panel {
          background: #050505;
          color: #979797;
        }

        .side-menu-header,
        .side-menu-title,
        .trending-tags-title,
        .top-creators-title {
          color: #979797;
        }

        .side-menu-toggle,
        .side-menu-close {
          border-color: rgba(36, 161, 83, 0.35);
          background: rgba(17, 17, 17, 0.94);
          color: #1eab55;
        }

        .trending-tag {
          border-color: rgba(36, 161, 83, 0.2);
          background: rgba(255, 255, 255, 0.04);
          color: #1eab55;
        }

        .trending-tag-count {
          background: rgba(36, 161, 83, 0.16);
          color: #fff;
        }

        ::slotted([data-side-menu-item]) {
          border-color: rgba(36, 161, 83, 0.2);
          /* background: #1eab55; */
          color: #1eab55;
        }

        ::slotted([data-side-menu-item].is-active) {
          background: #172920;
          color: #fff;
        }
      `;

      shadowRoot.append(style);
    });
  </script>

  <script>
    const VIEW_STORAGE_KEY = 'meme-feed-view';

    const applyViewMode = mode => {
      const nextMode = mode === 'grid' ? 'grid' : 'list';
      document.body.dataset.view = nextMode;

      const toggleButton = document.querySelector('page-topbar')?.toggleButton;
      if (toggleButton) {
        const isGrid = nextMode === 'grid';
        const listViewLabel = toggleButton.dataset.listViewLabel || '☰ List';
        const gridViewLabel = toggleButton.dataset.gridViewLabel || '▦ Grid';
        toggleButton.textContent = isGrid ? listViewLabel : gridViewLabel;
        toggleButton.setAttribute('aria-pressed', String(isGrid));
      }
    };

    applyViewMode(localStorage.getItem(VIEW_STORAGE_KEY) || 'grid');

    document.addEventListener('DOMContentLoaded', async (event) => {
      const toggleButton = document.querySelector('page-topbar')?.toggleButton;
      const sideMenu = document.getElementById('side-menu');

      // If viewport is mobile ( max-width: 767px ) and if so, default view to List ( not grid )
      if (window.innerWidth <= 767) {
        applyViewMode('list');
      }

      const setMenuOpen = isOpen => {
        document.body.classList.toggle('menu-open', isOpen);
        if (sideMenu) {
          sideMenu.open = isOpen;
        }
      };

      toggleButton?.addEventListener('click', () => {
        const nextMode = document.body.dataset.view === 'grid' ? 'list' : 'grid';
        applyViewMode(nextMode);
        localStorage.setItem(VIEW_STORAGE_KEY, nextMode);
      });

      sideMenu?.addEventListener('side-menu-toggle', event => {
        document.body.classList.toggle('menu-open', Boolean(event.detail?.open));
      });

      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          setMenuOpen(false);
        }
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 767) {
          setMenuOpen(false);
        }
      });
