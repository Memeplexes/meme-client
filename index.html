<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Meme Feed</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
    }

    .feed {
      max-width: 700px;
      margin: auto;
      padding: 10px 10px 96px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .meme {
      margin-bottom: 0;
    }

    .meme img,
    .meme video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      background: black;
    }

    video {
      object-fit: contain;
    }

    .image-shell {
      position: relative;
      border-radius: 10px;
      background: black;
      overflow: hidden;
      min-height: 400px;
      width: 100%;
    }

    .image-shell::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      margin: -16px 0 0 -16px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: image-spinner 0.75s linear infinite;
    }

    .image-shell.is-loaded::before,
    .image-shell.is-error::before {
      display: none;
    }

    .image-shell img {
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .image-shell.is-loaded img,
    .image-shell.is-error img {
      opacity: 1;
    }

    @keyframes image-spinner {
      to {
        transform: rotate(360deg);
      }
    }

    .search-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 1000;
      padding: 0 16px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .search-box {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      pointer-events: auto;
    }

    .search-box input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(24, 24, 24, 0.94);
      color: white;
      padding: 18px 24px;
      font-size: 20px;
      text-align: center;
      outline: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .search-box search-bar-tags {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .view-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1002;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(24, 24, 24, 0.94);
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    body[data-view="grid"] .feed {
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    body[data-view="grid"] .image-shell {
      min-height: 220px;
    }

    #floating-octocat {
      position: fixed;
      right: 16px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      width: 64px;
      height: 64px;
      object-fit: contain;
      z-index: 1001;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.92);
      border-radius: 42% / 46%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.55);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #floating-octocat.is-interactive {
      pointer-events: auto;
    }

    #floating-octocat.is-hovered {
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.75);
    }

    #upload-memes {
      position: fixed;
      left: 16px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      z-index: 1001;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: black;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    @media (max-width: 767px) {
      .view-toggle {
        top: 12px;
        right: 12px;
        padding: 10px 14px;
      }

      #floating-octocat {
        right: 12px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        width: 48px;
        height: 48px;
      }
    }
    side-menu {
      --side-menu-width: 250px;
    }

    side-menu [data-side-menu-item] {
      display: block;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.2;
      border-radius: 10px;
    }

    body {
      padding-left: var(--side-menu-width, 250px);
      box-sizing: border-box;
    }

    .feed {
      /* margin-left: max(24px, calc((100vw - 250px - 700px) / 2)); */
      margin-right: auto;
    }

    .search-shell {
      left: var(--side-menu-width, 250px);
    }

    @media (max-width: 767px) {
      body {
        padding-left: 0;
      }

      .feed {
        margin: auto;
      }

      .search-shell {
        left: 0;
      }

      body.menu-open {
        overflow: hidden;
      }
    }

    @media (min-width: 768px) {
      .search-shell {
        padding: 0 20px;
      }

      .feed {
        padding-bottom: 110px;
      }

      #floating-octocat {
        right: 20px;
        bottom: calc(104px + env(safe-area-inset-bottom));
      }

      .view-toggle {
        top: 20px;
        right: 20px;
      }
    }
  </style>
</head>

<body>
  <side-menu id="side-menu" title="Feed" toggle-label="Open feed menu" menu-label="Feed menu">
    <a class="is-active" href="#hot" data-side-menu-item data-active>Hot</a>
    <a href="#new" data-side-menu-item>New</a>
    <a href="#rising" data-side-menu-item>Rising</a>
    <a href="#contests" data-side-menu-item>Contests</a>
    <a href="#trending-tags" data-side-menu-item>Trending Tags</a>
    <a href="#top-creators" data-side-menu-item>Top Creators</a>
  </side-menu>
  <h1 class="me"> </h1>
  <div class="feed" id="feed"></div>
  <div class="search-shell">

    <label class="search-box" for="search-input">
      <!--
      <input id="search-input" type="search" placeholder="Search by filename" autocapitalize="none" autocomplete="off"
        autocorrect="off" spellcheck="false">
        -->
      <search-bar-tags id="search-input" placeholder="Search..." initial-query="your initial query here">HELLo do you
        like birds
      </search-bar-tags>

    </label>
  </div>

  <button class="view-toggle" id="view-toggle" type="button" aria-pressed="false">Grid View</button>

  <script type="module" src="/meme-client.js"></script>
  <script type="module" src="./lib/SideMenu.js"></script>
  <!-- <script src="https://buddypond.com/bp.js"></script> -->
  <script src="http://localhost/bp.js"></script>
  <script>
    const VIEW_STORAGE_KEY = 'meme-feed-view';

    const applyViewMode = mode => {
      const nextMode = mode === 'grid' ? 'grid' : 'list';
      document.body.dataset.view = nextMode;

      const toggleButton = document.getElementById('view-toggle');
      if (toggleButton) {
        const isGrid = nextMode === 'grid';
        toggleButton.textContent = isGrid ? 'List View' : 'Grid View';
        toggleButton.setAttribute('aria-pressed', String(isGrid));
      }
    };

    applyViewMode(localStorage.getItem(VIEW_STORAGE_KEY) || 'grid');

    document.addEventListener('DOMContentLoaded', async (event) => {
      const toggleButton = document.getElementById('view-toggle');
      const sideMenu = document.getElementById('side-menu');

      const setMenuOpen = isOpen => {
        document.body.classList.toggle('menu-open', isOpen);
        if (sideMenu) {
          sideMenu.open = isOpen;
        }
      };

      toggleButton?.addEventListener('click', () => {
        const nextMode = document.body.dataset.view === 'grid' ? 'list' : 'grid';
        applyViewMode(nextMode);
        localStorage.setItem(VIEW_STORAGE_KEY, nextMode);
      });

      sideMenu?.addEventListener('side-menu-toggle', event => {
        document.body.classList.toggle('menu-open', Boolean(event.detail?.open));
      });

      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          setMenuOpen(false);
        }
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 767) {
          setMenuOpen(false);
        }
      });

      await bp.init({
        // env: 'dev',
        host: 'http://192.168.200.59'
      });
      bp.on('auth::qtoken', 'memeplexes-login', (qtoken) => {
        console.log('Received qtoken in meme feed:', qtoken);
        let { me } = qtoken;
        // update title bar with me
        document.title = `Meme Feed - Logged in as ${me}`;
        document.querySelector('.me').textContent = `Logged in as ${me}`;
      });
      bp.open('auth');


      // click event on .upload-memes
      document.getElementById('upload-memes').addEventListener('click', () => {
        bp.open('file-explorer', {
          // panel: '.targetDiv2'   // optional, default mode is Window
        });
      });

      //bp.open('taskbar');      // taskbar app defaults fixed bottom
    });
  </script>
  <img id="floating-octocat" src="./assets/liberty-octocat-github-256.png" alt="Open meme-client on GitHub" role="link"
    tabindex="0">
    <!--
    <button id="upload-memes">
      UPLOAD
    </button>
    -->
</body>

</html>
